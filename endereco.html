<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Endereço</title>
</head>
<body>
  <h1>Cadastro de Endereço</h1>
  <form id="formEndereco">
    <label>CEP: <input type="text" id="cep" maxlength="9" placeholder="00000-000"></label><br><br>
    <label>Logradouro: <input type="text" id="logradouro"></label><br><br>
    <label>Número: <input type="text" id="numero"></label><br><br>
    <label>Complemento: <input type="text" id="complemento"></label><br><br>
    <label>UF: <input type="text" id="uf" maxlength="2"></label><br><br>
    <button type="submit">Cadastrar</button>
  </form>
  <script src="script.js"></script>
</body>
</html>
